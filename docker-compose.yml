services:
  postgres:
    image: postgres:16-alpine
    container_name: gp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gestao_pecuaria
      POSTGRES_USER: gp_user
      POSTGRES_PASSWORD: gp_pass
    ports:
      - "5432:5432"
    volumes:
      - gp_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gp_user -d gestao_pecuaria"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  gp_postgres_data:
